<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Cat — Meowtopia 🐾</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main>
        <div class="page-header">
            <h1>Complete Your Adoption 💕</h1>
            <p>You're one step away from becoming a cat parent!</p>
        </div>

        <section class="section">
            <div class="container" style="max-width: 640px;">
                <div id="adopt-content"></div>
            </div>
        </section>
    </main>

    <!-- Adoption Success Popup -->
    <div class="modal-overlay" id="adoption-modal">
        <div class="modal">
            <div class="modal-emoji" id="modal-emoji">🎉</div>
            <h3 id="modal-title">Congratulations!</h3>
            <p id="modal-message"></p>
            <div class="food-tip" id="modal-food-tip"></div>
            <a href="dashboard.html" class="btn btn-primary">Go to My Cats 🏡</a>
            <a href="../index.html" class="btn btn-outline mt-2" style="display: block; margin-top: 12px;">Back to Home</a>
        </div>
    </div>

    <footer class="footer" id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('adopt');

        const user = getCurrentUser();
        const catid = getParam('id');
        const cat = getCatById(catid);
        const content = document.getElementById('adopt-content');

        // Auth check
        if (!user) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-emoji">🔐</div>
                    <h3>Login Required</h3>
                    <p>You need to be logged in to adopt a cat!</p>
                    <a href="login.html" class="btn btn-primary mt-2">Login Now</a>
                </div>
            `;
        } else if (!cat) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-emoji">😿</div>
                    <h3>Cat not found</h3>
                    <p>This cat may no longer be available.</p>
                    <a href="cats.html" class="btn btn-primary mt-2">Browse Cats</a>
                </div>
            `;
        } else if (!cat.is_available) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-emoji">💕</div>
                    <h3>Already Adopted</h3>
                    <p>This lucky kitty already found a home!</p>
                    <a href="cats.html" class="btn btn-primary mt-2">Browse Other Cats</a>
                </div>
            `;
        } else {
            // Show adoption form
            content.innerHTML = `
                <!-- Cat Preview -->
                <div class="adoption-cat-preview">
                    <div class="preview-image" style="background: ${cat.gradient};">
                        ${getCatImageHTML(cat)}
                    </div>
                    <div class="preview-info">
                        <h3>${cat.breed}</h3>
                        <p>${cat.age} · ${cat.gender} · ${cat.cattitude}</p>
                    </div>
                </div>

                <div style="background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px;">
                    <h3 style="margin-bottom: 20px;">Adoption Details</h3>
                    
                    <div id="adopt-alert"></div>

                    <form id="adoption-form" onsubmit="handleAdoption(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Your Name</label>
                                <input type="text" value="${user.full_name}" readonly style="opacity: 0.7;">
                            </div>
                            <div class="form-group">
                                <label>Your Phone</label>
                                <input type="text" id="phone" value="${user.phone || ''}" placeholder="Your phone number" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Your Address</label>
                            <textarea id="address" placeholder="Your address for delivery" required>${user.address || ''}</textarea>
                        </div>

                        <div class="form-group">
                            <label for="cat_name">Name for your new fur baby 🐱</label>
                            <input type="text" id="cat_name" placeholder="e.g., Whiskers, Luna, Mochi..." required>
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Give your new companion a special name!</div>
                        </div>

                        <div class="form-group">
                            <label>How would you like to receive your cat?</label>
                            <div class="radio-group">
                                <div class="radio-option">
                                    <input type="radio" id="pickup" name="pickup_method" value="pickup" checked>
                                    <label for="pickup">🏪 Store Pickup</label>
                                </div>
                                <div class="radio-option">
                                    <input type="radio" id="delivery" name="pickup_method" value="delivery">
                                    <label for="delivery">🏠 Home Delivery</label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block" style="font-size: 1.05rem; padding: 14px;">
                            Complete Adoption 🐾
                        </button>
                    </form>
                </div>
            `;
        }

        function handleAdoption(e) {
            e.preventDefault();

            const catName = document.getElementById('cat_name').value.trim();
            const pickupMethod = document.querySelector('input[name="pickup_method"]:checked').value;

            if (!catName) {
                document.getElementById('adopt-alert').innerHTML = '<div class="alert alert-error">Please give your cat a name!</div>';
                return;
            }

            // Create adoption
            const adoption = createAdoption({
                userid: user.userid,
                catid: parseInt(catid),
                cat_name_given: catName,
                pickup_method: pickupMethod
            });

            // Get food preferences for the popup
            const foodPrefs = getCatFoodPrefs(catid);
            const foodNames = foodPrefs.map(f => f.name).join(' and ') || 'some delicious treats';

            // Show popup
            const modal = document.getElementById('adoption-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const modalFoodTip = document.getElementById('modal-food-tip');
            const modalEmoji = document.getElementById('modal-emoji');

            if (pickupMethod === 'pickup') {
                modalEmoji.textContent = '🏪';
                modalTitle.textContent = `You're adopting ${catName}!`;
                modalMessage.textContent = `We can't wait to see you at Meowtopia! ${catName} is all ready for their new life with you.`;
                modalFoodTip.innerHTML = `🐾 Don't forget to bring <strong>${foodNames}</strong> when you come to pick up <strong>${catName}</strong>! We can't wait to see you!`;
            } else {
                modalEmoji.textContent = '🚗';
                modalTitle.textContent = `${catName} is on the way!`;
                modalMessage.textContent = `Get ready — your new best friend is being prepared for their journey to their forever home!`;
                modalFoodTip.innerHTML = `🏠 <strong>${catName}</strong> is coming home! Make sure to prepare some <strong>${foodNames}</strong> for their grand arrival! 🐱`;
            }

            modal.classList.add('active');
        }

        // Close modal on overlay click
        document.getElementById('adoption-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
    </script>
</body>
</html>
