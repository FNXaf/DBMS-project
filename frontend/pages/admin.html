<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div id="admin-check"></div>

    <div class="admin-container" id="admin-layout" style="display:none">
        <div class="admin-header">
            <h1>Admin Panel 🛠️</h1>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('cats',this)">🐱 Cats</button>
            <button class="admin-tab" onclick="switchTab('adoptions',this)">📋 Adoptions</button>
            <button class="admin-tab" onclick="switchTab('add-cat',this)">➕ Add Cat</button>
        </div>

        <!-- Cats Panel -->
        <div class="admin-panel active" id="panel-cats">
            <div class="admin-table-wrap" id="cats-table-container"></div>
        </div>

        <!-- Adoptions Panel -->
        <div class="admin-panel" id="panel-adoptions">
            <div class="admin-table-wrap" id="adoptions-table-container"></div>
        </div>

        <!-- Add Cat Panel -->
        <div class="admin-panel" id="panel-add-cat">
            <div class="add-cat-form">
                <h3>Add New Cat</h3>
                <div id="add-cat-alert"></div>
                <form id="add-cat-form" onsubmit="handleAddCat(event)">
                    <div class="form-group">
                        <label>Shelter Name * <small style="color:var(--text-muted)">(unique, given by admin)</small></label>
                        <input type="text" id="cat-shelter-name" placeholder="e.g., Snowball, Pumpkin" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Breed *</label>
                            <input type="text" id="cat-breed" placeholder="e.g., Persian, Siamese" required>
                        </div>
                        <div class="form-group">
                            <label>Fur Color</label>
                            <input type="text" id="cat-fur" placeholder="e.g., White, Tabby">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth *</label>
                            <input type="date" id="cat-dob" required>
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="cat-gender" required>
                                <option value="">Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Intake Date *</label>
                            <input type="date" id="cat-intake" required>
                        </div>
                        <div class="form-group">
                            <label>Health Status</label>
                            <select id="cat-health">
                                <option value="Healthy">Healthy</option>
                                <option value="Needs Care">Needs Care</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cattitude (Personality)</label>
                        <select id="cat-cattitude" required style="margin-bottom:.4rem">
                            <option value="">Select or add new</option>
                        </select>
                        <input type="text" id="cat-cattitude-new" placeholder="Add new cattitude..." style="display:none;margin-top:.4rem">
                        <small id="cattitude-hint" style="color:var(--text-muted);display:block;margin-top:.3rem">Pick from existing or click "Add New"</small>
                        <button type="button" class="btn-outline" id="add-cattitude-btn" style="padding:.3rem .6rem;font-size:.8rem;margin-top:.4rem;display:none" onclick="toggleCattitudeInput()">Back to List</button>
                    </div>
                    <div class="form-group">
                        <label>Upload Photo</label>
                        <input type="file" id="cat-photo-file" accept="image/*" onchange="previewCatPhoto(this)">
                        <small style="color:var(--text-muted)">Upload an image. You can crop/position it below. Leave empty for auto-placeholder.</small>
                        <div id="cat-photo-preview" style="margin-top:.6rem;display:none">
                            <div class="img-crop-preview">
                                <img id="cat-photo-preview-img" src="" alt="Preview">
                            </div>
                            <div style="margin-top:.4rem">
                                <label style="font-size:.82rem;font-weight:600;color:var(--text-light)">Position: </label>
                                <select id="cat-photo-position" style="padding:.25rem .5rem;border-radius:6px;border:1px solid var(--border);font-size:.82rem">
                                    <option value="center">Center</option>
                                    <option value="top">Top</option>
                                    <option value="bottom">Bottom</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="form-submit">Add Cat 🐱</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Edit Cat Modal -->
    <div class="modal-backdrop" id="edit-cat-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeEditModal()">✕</button>
            <h2>Edit Cat Details</h2>
            <div id="edit-cat-form-content"></div>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('admin');

        const user = getCurrentUser();
        const adminCheck = document.getElementById('admin-check');
        const adminLayout = document.getElementById('admin-layout');

        if (!user || user.role !== 'admin') {
            adminCheck.innerHTML = `
                <div class="form-page">
                    <div class="form-card text-center">
                        <h2>🔐 Admin Access Only</h2>
                        <p style="color:var(--text-light)">You need to be logged in as an admin.</p>
                        <a href="login.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Login as Admin</a>
                    </div>
                </div>`;
        } else {
            adminLayout.style.display = '';
            loadCatsTable();
            loadAdoptionsTable();
            loadCattitudeDropdown();
            
            // Set up cattitude dropdown event listener
            const cattitudeSelect = document.getElementById('cat-cattitude');
            if (cattitudeSelect) {
                cattitudeSelect.addEventListener('change', onCattitudeChange);
            }
            
            // Auto-fill intake date with today's date
            const intakeInput = document.getElementById('cat-intake');
            if (intakeInput && !intakeInput.value) {
                const today = new Date().toISOString().split('T')[0];
                intakeInput.value = today;
            }
        }

        /* ---- Tab switching ---- */
        function switchTab(name, btn) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('active');
            document.querySelectorAll('.admin-tabs .admin-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (name === 'cats') loadCatsTable();
            if (name === 'adoptions') loadAdoptionsTable();
        }

        /* ---- Cats Table ---- */
        function loadCatsTable() {
            const cats = getCats();
            const c = document.getElementById('cats-table-container');
            if (cats.length === 0) { c.innerHTML = '<p class="text-center mt-3" style="color:var(--text-muted)">No cats yet</p>'; return; }

            c.innerHTML = `<table class="admin-table"><thead><tr>
                <th>ID</th><th>Shelter Name</th><th>Breed</th><th>Age</th><th>Gender</th><th>Cattitude</th><th>Health</th><th>Status</th><th>Actions</th>
            </tr></thead><tbody>
                ${cats.map(cat => `<tr>
                    <td>#${cat.catid}</td>
                    <td><strong>${cat.shelter_name}</strong></td>
                    <td>${cat.breed}</td>
                    <td>${formatAge(cat.dob)}</td>
                    <td>${cat.gender}</td>
                    <td>${cat.cattitude || '—'}</td>
                    <td>${cat.health_status}</td>
                    <td><span class="status-badge ${cat.is_available ? 'approved' : 'rejected'}">${cat.is_available ? 'Available' : 'Adopted'}</span></td>
                    <td><div class="actions">
                        <button class="btn-edit" onclick="editCat(${cat.catid})">Edit</button>
                        <button class="btn-delete" onclick="handleDeleteCat(${cat.catid})">Delete</button>
                    </div></td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        /* ---- Adoptions Table ---- */
        function loadAdoptionsTable() {
            const adoptions = getAdoptions();
            const c = document.getElementById('adoptions-table-container');
            if (adoptions.length === 0) { c.innerHTML = '<p class="text-center mt-3" style="color:var(--text-muted)">No adoption requests yet</p>'; return; }

            c.innerHTML = `<table class="admin-table"><thead><tr>
                <th>ID</th><th>User</th><th>Cat Name</th><th>Breed</th><th>Pickup</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr></thead><tbody>
                ${adoptions.map(a => {
                    const adopter = getUserById(a.userid);
                    const cat = getCatById(a.catid);
                    return `<tr>
                        <td>#${a.adoptionid}</td>
                        <td>${adopter ? adopter.full_name : 'Unknown'}</td>
                        <td><strong>${a.cat_name_given}</strong></td>
                        <td>${cat ? cat.breed : '—'}</td>
                        <td>${a.pickup_method === 'pickup' ? '🏪' : '🏠'}</td>
                        <td>${formatDate(a.adoption_date)}</td>
                        <td><span class="status-badge ${a.status.toLowerCase()}">${a.status}</span></td>
                        <td><div class="actions">
                            ${a.status === 'Pending' ? `<button class="btn-edit" onclick="changeAdoptionStatus(${a.adoptionid},'Approved')">Approve</button>` : ''}
                            ${a.status === 'Approved' ? `<button class="btn-edit" onclick="changeAdoptionStatus(${a.adoptionid},'Completed')">Complete</button>` : ''}
                        </div></td>
                    </tr>`;
                }).join('')}
            </tbody></table>`;
        }

        /* ---- Cattitude Dropdown ---- */
        function loadCattitudeDropdown() {
            const cats = getCats();
            const cattitudes = [...new Set(cats.map(c => c.cattitude).filter(Boolean))].sort();
            const sel = document.getElementById('cat-cattitude');
            if (sel) {
                sel.innerHTML = '<option value="">Select personality</option>' +
                    cattitudes.map(c => `<option value="${c}">${c}</option>`).join('') +
                    '<option value="">— Add New —</option>';
            }
        }

        function toggleCattitudeInput() {
            const sel = document.getElementById('cat-cattitude');
            const input = document.getElementById('cat-cattitude-new');
            const btn = document.getElementById('add-cattitude-btn');
            const hint = document.getElementById('cattitude-hint');
            if (input.style.display === 'none') {
                input.style.display = '';
                sel.style.display = 'none';
                btn.textContent = 'Back to List';
                hint.textContent = 'Adding new cattitude quality';
                input.focus();
            } else {
                input.style.display = 'none';
                sel.style.display = '';
                btn.style.display = 'none';
                hint.textContent = 'Pick from existing or click "Add New"';
                input.value = '';
            }
        }

        function onCattitudeChange() {
            const sel = document.getElementById('cat-cattitude');
            const input = document.getElementById('cat-cattitude-new');
            const btn = document.getElementById('add-cattitude-btn');
            if (sel.value === '') {
                btn.style.display = '';
            } else {
                btn.style.display = 'none';
                input.style.display = 'none';
                input.value = '';
            }
        }

        /* ---- Cat Photo Upload Preview ---- */
        let catPhotoDataUrl = '';
        function previewCatPhoto(input) {
            const preview = document.getElementById('cat-photo-preview');
            const img = document.getElementById('cat-photo-preview-img');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    catPhotoDataUrl = e.target.result;
                    img.src = catPhotoDataUrl;
                    preview.style.display = '';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.style.display = 'none';
                catPhotoDataUrl = '';
            }
        }

        /* ---- Handlers ---- */
        function handleAddCat(e) {
            e.preventDefault();
            const alert = document.getElementById('add-cat-alert');
            const shelterName = document.getElementById('cat-shelter-name').value.trim();

            // Check shelter_name uniqueness
            const existing = getCats().find(c => c.shelter_name.toLowerCase() === shelterName.toLowerCase());
            if (existing) {
                alert.innerHTML = '<p style="color:#d63031;font-weight:700;margin-bottom:.6rem">⚠️ A cat with this shelter name already exists!</p>';
                return;
            }

            const objectPosition = document.getElementById('cat-photo-position') ? document.getElementById('cat-photo-position').value : 'center';
            
            // Handle cattitude: either from dropdown or new input
            let cattitude = document.getElementById('cat-cattitude').value.trim();
            const cattitudeNew = document.getElementById('cat-cattitude-new').value.trim();
            if (!cattitude && cattitudeNew) {
                cattitude = capitalizeWords(cattitudeNew);
            } else if (!cattitude) {
                cattitude = 'Friendly';
            }
            
            // Auto-fill intake date if empty
            let intakeDate = document.getElementById('cat-intake').value;
            if (!intakeDate) {
                intakeDate = new Date().toISOString().split('T')[0];
            }

            const newCat = addCat({
                shelter_name: shelterName,
                breed: document.getElementById('cat-breed').value.trim(),
                fur_color: document.getElementById('cat-fur').value.trim() || 'Unknown',
                dob: document.getElementById('cat-dob').value,
                gender: document.getElementById('cat-gender').value,
                intake_date: intakeDate,
                health_status: document.getElementById('cat-health').value,
                cattitude: cattitude,
                photo_url: catPhotoDataUrl || '',
                photo_position: objectPosition
            });

            if (newCat) {
                alert.innerHTML = `<p style="color:#00b894;font-weight:700;margin-bottom:.6rem">✅ Cat "${shelterName}" added! (ID: #${newCat.catid})</p>`;
                document.getElementById('add-cat-form').reset();
                document.getElementById('cat-photo-preview').style.display = 'none';
                document.getElementById('cat-cattitude-new').style.display = 'none';
                document.getElementById('add-cattitude-btn').style.display = 'none';
                catPhotoDataUrl = '';
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('cat-intake').value = today;
                loadCatsTable();
                loadCattitudeDropdown();
            } else {
                alert.innerHTML = '<p style="color:#d63031;font-weight:700;margin-bottom:.6rem">⚠️ Failed to add cat. Shelter name might be a duplicate.</p>';
            }
        }

        function capitalizeWords(str) {
            return str.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
        }

        function handleDeleteCat(catid) {
            if (confirm('Delete this cat?')) { deleteCat(catid); loadCatsTable(); }
        }
        function changeAdoptionStatus(id, status) { updateAdoptionStatus(id, status); loadAdoptionsTable(); }

        /* ---- Edit Cat Modal ---- */
        function editCat(catid) {
            const cat = getCatById(catid);
            if (!cat) return;
            window._editCatPhotoData = '';

            const currentPhotoHTML = cat.photo_url
                ? `<div class="img-crop-preview" style="margin-bottom:.5rem"><img src="${cat.photo_url}" alt="Current" style="object-position:${cat.photo_position || 'center'}"></div>`
                : '<p style="color:var(--text-muted);font-size:.85rem">No photo uploaded</p>';

            document.getElementById('edit-cat-form-content').innerHTML = `
                <form onsubmit="saveEditCat(event,${catid})">
                    <div class="form-group">
                        <label>Shelter Name *</label>
                        <input type="text" id="edit-shelter-name" value="${cat.shelter_name}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Breed</label>
                            <input type="text" id="edit-breed" value="${cat.breed}" required>
                        </div>
                        <div class="form-group">
                            <label>Fur Color</label>
                            <input type="text" id="edit-fur" value="${cat.fur_color || ''}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" id="edit-dob" value="${cat.dob || ''}">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="edit-gender">
                                <option value="Male" ${cat.gender==='Male'?'selected':''}>Male</option>
                                <option value="Female" ${cat.gender==='Female'?'selected':''}>Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Health Status</label>
                            <select id="edit-health">
                                <option value="Healthy" ${cat.health_status==='Healthy'?'selected':''}>Healthy</option>
                                <option value="Needs Care" ${cat.health_status==='Needs Care'?'selected':''}>Needs Care</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Cattitude</label>
                            <input type="text" id="edit-cattitude" value="${cat.cattitude || ''}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Availability</label>
                        <select id="edit-available">
                            <option value="true" ${cat.is_available?'selected':''}>Available</option>
                            <option value="false" ${!cat.is_available?'selected':''}>Adopted / Unavailable</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Photo</label>
                        ${currentPhotoHTML}
                        <input type="file" accept="image/*" onchange="editCatPhotoPreview(this,${catid})" style="margin-top:.4rem">
                        <div style="display:none;margin-top:.4rem">
                            <div class="img-crop-preview"><img id="edit-cat-photo-img" src="" alt="New"></div>
                        </div>
                        <div style="margin-top:.4rem">
                            <label style="font-size:.82rem;font-weight:600;color:var(--text-light)">Position: </label>
                            <select id="edit-photo-position" style="padding:.25rem .5rem;border-radius:6px;border:1px solid var(--border);font-size:.82rem">
                                <option value="center" ${(cat.photo_position||'center')==='center'?'selected':''}>Center</option>
                                <option value="top" ${cat.photo_position==='top'?'selected':''}>Top</option>
                                <option value="bottom" ${cat.photo_position==='bottom'?'selected':''}>Bottom</option>
                            </select>
                        </div>
                    </div>
                    <div style="display:flex;gap:.8rem;margin-top:1rem">
                        <button type="submit" class="btn-primary" style="flex:1;padding:.65rem;border-radius:8px">Save Changes</button>
                        <button type="button" class="btn-outline" style="flex:1;padding:.65rem;border-radius:8px" onclick="closeEditModal()">Cancel</button>
                    </div>
                </form>`;

            document.getElementById('edit-cat-modal').classList.add('show');
        }

        function saveEditCat(e, catid) {
            e.preventDefault();
            const newShelterName = document.getElementById('edit-shelter-name').value.trim();
            const cat = getCatById(catid);

            // Check uniqueness if name changed
            if (newShelterName.toLowerCase() !== cat.shelter_name.toLowerCase()) {
                const dup = getCats().find(c => c.shelter_name.toLowerCase() === newShelterName.toLowerCase() && c.catid !== catid);
                if (dup) { alert('A cat with this shelter name already exists!'); return; }
            }

            const updates = {
                shelter_name: newShelterName,
                breed: document.getElementById('edit-breed').value.trim(),
                fur_color: document.getElementById('edit-fur').value.trim(),
                dob: document.getElementById('edit-dob').value,
                gender: document.getElementById('edit-gender').value,
                health_status: document.getElementById('edit-health').value,
                cattitude: document.getElementById('edit-cattitude').value.trim(),
                is_available: document.getElementById('edit-available').value === 'true',
                photo_position: document.getElementById('edit-photo-position').value
            };

            // If a new photo was uploaded, use it
            if (window._editCatPhotoData) {
                updates.photo_url = window._editCatPhotoData;
            }

            updateCat(catid, updates);
            closeEditModal();
            loadCatsTable();
        }

        function closeEditModal() {
            document.getElementById('edit-cat-modal').classList.remove('show');
        }
        document.getElementById('edit-cat-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        /* ---- Edit Cat: also update photo upload support ---- */
        function editCatPhotoPreview(input, catid) {
            const img = document.getElementById('edit-cat-photo-img');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    window._editCatPhotoData = e.target.result;
                    img.src = e.target.result;
                    img.parentElement.style.display = '';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
