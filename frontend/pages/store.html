<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="store-container">
        <div class="store-header">
            <h1>🛒 Food Store</h1>
            <p style="color:var(--text-light)">Treat your fur babies to the best nutrition!</p>
        </div>

        <!-- Suggested Products — slideshow carousel -->
        <div class="suggested-bar" id="suggested-bar" style="display:none">
            <div class="suggested-heading" id="suggested-heading"></div>
            <div class="carousel-viewport">
                <div class="carousel-track" id="suggested-products"></div>
                <button class="carousel-arrow left" id="carousel-prev" onclick="prevSlide()">❮</button>
                <button class="carousel-arrow right" id="carousel-next" onclick="nextSlide()">❯</button>
            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
        </div>

        <!-- All Products Grid -->
        <div class="browse-layout store-layout">
            <button class="filter-toggle-btn" onclick="toggleStoreFilterSidebar()">☰ Filters</button>
            <div class="filter-overlay" id="store-filter-overlay" onclick="toggleStoreFilterSidebar()"></div>

            <aside class="filter-sidebar" id="store-filter-sidebar">
                <div class="filter-sidebar-header">
                    <h3>Food Filters</h3>
                    <div>
                        <button class="filter-clear-btn" onclick="resetStoreFilters()">Clear All</button>
                        <button class="filter-close" onclick="toggleStoreFilterSidebar()">✕</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Search</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="store-search-wrap">
                            <input id="food-search" class="store-search-input" type="text" placeholder="Search food name" oninput="setFoodSearch(this.value)">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Diet</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="toggle-group" id="store-diet-filter">
                            <button class="toggle-btn active" data-val="all" onclick="setDietFilter('all', this)">All</button>
                            <button class="toggle-btn" data-val="veg" onclick="setDietFilter('veg', this)">🌿 Veg</button>
                            <button class="toggle-btn" data-val="non-veg" onclick="setDietFilter('non-veg', this)">🍗 Non-Veg</button>
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Stock</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="toggle-group" id="store-stock-filter">
                            <button class="toggle-btn active" data-val="all" onclick="setStockFilter('all', this)">All</button>
                            <button class="toggle-btn" data-val="in-stock" onclick="setStockFilter('in-stock', this)">In Stock</button>
                            <button class="toggle-btn" data-val="low-stock" onclick="setStockFilter('low-stock', this)">Low (≤ 3)</button>
                        </div>
                    </div>
                </div>

                <div class="filter-group" id="owned-cats-filter-wrap" style="display:none">
                    <div class="filter-group-header" style="cursor:default">
                        <label>My Cats</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="chip-group" id="owned-cats-filter"></div>
                    </div>
                </div>
            </aside>

            <div class="browse-main store-main">
                <div class="sort-bar store-sort-bar">
                    <span class="results-count" id="store-results-count"></span>
                    <select id="store-sort" onchange="setStoreSort(this.value)">
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                        <option value="price-asc">Price Low → High</option>
                        <option value="price-desc">Price High → Low</option>
                    </select>
                </div>
                <h2 class="section-title" style="font-size:1.3rem">All Products</h2>
                <div class="products-grid" id="products-grid"></div>
                <p id="empty-products" style="display:none;text-align:center;color:var(--text-muted);padding:2rem">No food products available yet. Ask the admin to add some!</p>
            </div>
        </div>
    </main>

    <div class="floating-actions">
        <button class="floating-orders-btn" id="orders-fab" onclick="openOrders()" title="My Orders">📦</button>
        <button class="floating-cart-btn cart-badge" id="cart-fab" onclick="openCart()" title="Cart">
            🛒 <span class="cart-count" id="cart-count" style="display:none">0</span>
        </button>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

    <!-- Cart Flyout -->
    <div class="cart-flyout" id="cart-flyout">
        <div class="cart-flyout-header">
            <h2>Your Cart 🛒</h2>
            <button class="cart-flyout-close" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-flyout-body" id="cart-body">
            <p class="cart-empty">Your cart is empty</p>
        </div>
        <div class="cart-flyout-footer" id="cart-footer" style="display:none">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-amount">₹0</span>
            </div>
            <button class="checkout-btn" onclick="openCheckoutModal()">Checkout 💳</button>
        </div>
    </div>

    <div class="modal-backdrop checkout-modal-backdrop" id="checkout-modal" onclick="if(event.target===this)closeCheckoutModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeCheckoutModal()">✕</button>
            <h2>Complete Checkout</h2>
            <p class="form-subtitle">Choose how you want to receive your order.</p>
            <div class="checkout-methods">
                <label class="checkout-method-option">
                    <input type="radio" name="checkout-method" value="home_delivery" checked onchange="onCheckoutMethodChange()">
                    <span>🏠 Home Delivery</span>
                </label>
                <label class="checkout-method-option">
                    <input type="radio" name="checkout-method" value="store_pickup" onchange="onCheckoutMethodChange()">
                    <span>🏪 Pickup From Store</span>
                </label>
                <label class="checkout-method-option">
                    <input type="radio" name="checkout-method" value="store_visit" onchange="onCheckoutMethodChange()">
                    <span>🚶 Store Visit</span>
                </label>
            </div>
            <div id="checkout-address-wrap" class="checkout-field mt-2">
                <label for="checkout-address">Delivery Address</label>
                <textarea id="checkout-address" rows="3" placeholder="Enter your delivery address"></textarea>
            </div>
            <div class="checkout-field mt-2">
                <label for="checkout-note">Note (optional)</label>
                <textarea id="checkout-note" rows="2" placeholder="Any instructions for your order"></textarea>
            </div>
            <div class="checkout-actions mt-3">
                <button class="checkout-cancel-btn" onclick="closeCheckoutModal()">Cancel</button>
                <button class="checkout-btn" onclick="handleCheckout()">Confirm Order</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="orders-modal" onclick="if(event.target===this)closeOrders()">
        <div class="modal">
            <button class="modal-close" onclick="closeOrders()">✕</button>
            <h2>My Orders 📦</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('store');

        const user = getCurrentUser();
        const userid = user ? user.userid : null;
        let storeFilters = { search: '', diet: 'all', stock: 'all', sort: 'name-asc', selectedCats: new Set() };
        let carouselInterval = null;
        let carouselIndex = 0;
        let isCarouselPausedByUser = false;

        function getOwnedCats() {
            if (!userid) return [];
            const adoptions = getUserAdoptions(userid).filter(a => ['Pending','Approved','Completed'].includes(a.status));
            const seen = new Set();
            return adoptions.map(a => getCatById(a.catid)).filter(c => {
                if (!c || seen.has(c.catid)) return false;
                seen.add(c.catid);
                return true;
            });
        }

        function getFoodDietType(food) {
            const n = (food.name || '').toLowerCase();
            if (n.includes('catnip') || n.includes('milk')) return 'veg';
            return 'non-veg';
        }

        function getOwnedCatPreferenceMap() {
            const ownedCatIds = new Set(getOwnedCats().map(c => c.catid));
            return {
                ownedCatIds,
                byFood: foodid => getCatsThatPreferFood(foodid).filter(c => ownedCatIds.has(c.catid))
            };
        }

        /* ---- Toast helper ---- */
        function showToast(msg, type) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast ' + (type || '');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3200);
        }

        /* ---- Render Suggested Products ---- */
        function renderSuggested() {
            if (!userid) return;
            const suggested = getSuggestedFoods(userid);
            if (suggested.length === 0) return;

            // Build heading with cat names (up to 3)
            const adoptions = getUserAdoptions(userid).filter(a => ['Pending','Approved','Completed'].includes(a.status));
            const ownedCatIds = new Set(adoptions.map(a => a.catid));
            const catNames = [...new Set(adoptions.map(a => {
                const cat = getCatById(a.catid);
                return cat ? (cat.name || cat.shelter_name) : null;
            }).filter(Boolean))];
            let nameLabel;
            if (catNames.length === 0) nameLabel = 'your cats';
            else if (catNames.length === 1) nameLabel = catNames[0];
            else if (catNames.length === 2) nameLabel = catNames[0] + ' & ' + catNames[1];
            else if (catNames.length === 3) nameLabel = catNames[0] + ', ' + catNames[1] + ' & ' + catNames[2];
            else nameLabel = 'your cats';

            document.getElementById('suggested-bar').style.display = '';
            document.getElementById('suggested-heading').innerHTML = `
                <span class="suggested-heading-label">Recommended for:</span>
                <span class="suggested-heading-cats">${nameLabel}</span>
            `;
            const container = document.getElementById('suggested-products');
            const previousIndex = carouselIndex;
            // Build horizontal cards as carousel slides
            container.innerHTML = suggested.map(f => {
                const preferringCats = getCatsThatPreferFood(f.foodid).filter(c => ownedCatIds.has(c.catid));
                const catTags = preferringCats.length > 0 
                    ? `<div class="food-cats-tags">${preferringCats.map(c => `<span class="food-cat-chip">${c.name || c.shelter_name || 'Cat'}</span>`).join('')}</div>`
                    : '';
                return `
                <div class="carousel-slide">
                    <div class="sparkle-card sparkle-horizontal">
                        <div class="sparkle-h-img">
                            <img src="${f.image_url || ''}" alt="${f.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                            <span class="sparkle-h-emoji" style="display:none">${f.emoji || '🍽️'}</span>
                        </div>
                        <div class="sparkle-h-body">
                            <h4>${f.name}</h4>
                            <div class="recommended-meta-row">
                                <span class="food-type-badge ${getFoodDietType(f) === 'veg' ? 'veg' : 'non-veg'}">${getFoodDietType(f) === 'veg' ? '🌿 Veg' : '🍗 Non-Veg'}</span>
                                ${catTags}
                            </div>
                            <span class="price">₹${f.price.toFixed(2)}</span>
                            <span class="stock ${f.qty <= 3 ? 'low' : ''}">${f.qty > 0 ? f.qty + ' in stock' : 'Out of stock'}</span>
                            <button class="add-cart-btn" ${f.qty <= 0 ? 'disabled' : ''} onclick="event.stopPropagation();handleAddToCart(${f.foodid}, true)">
                                ${f.qty > 0 ? 'Add to Cart' : 'Out of Stock'}
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');

            // Init carousel auto-scroll
            initCarousel(previousIndex);
        }

        function applyStoreFilters(foods) {
            const prefMap = getOwnedCatPreferenceMap();
            let filtered = [...foods];

            if (storeFilters.search.trim()) {
                const q = storeFilters.search.trim().toLowerCase();
                filtered = filtered.filter(f => f.name.toLowerCase().includes(q));
            }

            if (storeFilters.diet !== 'all') {
                filtered = filtered.filter(f => getFoodDietType(f) === storeFilters.diet);
            }

            if (storeFilters.stock === 'in-stock') {
                filtered = filtered.filter(f => f.qty > 0);
            } else if (storeFilters.stock === 'low-stock') {
                filtered = filtered.filter(f => f.qty > 0 && f.qty <= 3);
            }

            if (storeFilters.selectedCats.size > 0) {
                filtered = filtered.filter(f => prefMap.byFood(f.foodid).some(c => storeFilters.selectedCats.has(c.catid)));
            }

            filtered.sort((a, b) => {
                if (storeFilters.sort === 'name-asc') return a.name.localeCompare(b.name);
                if (storeFilters.sort === 'name-desc') return b.name.localeCompare(a.name);
                if (storeFilters.sort === 'price-asc') return a.price - b.price;
                if (storeFilters.sort === 'price-desc') return b.price - a.price;
                return 0;
            });
            return filtered;
        }

        /* ---- Render All Products ---- */
        function renderProducts() {
            const foods = getFood();
            const grid = document.getElementById('products-grid');
            const empty = document.getElementById('empty-products');
            const countEl = document.getElementById('store-results-count');
            const prefMap = getOwnedCatPreferenceMap();
            const ownedCatIds = prefMap.ownedCatIds;
            const filteredFoods = applyStoreFilters(foods);

            if (filteredFoods.length === 0) {
                grid.style.display = 'none';
                empty.style.display = '';
                countEl.textContent = '0 products shown';
                empty.textContent = foods.length === 0
                    ? 'No food products available yet. Ask the admin to add some!'
                    : 'No products match your current filters.';
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';
            countEl.textContent = `${filteredFoods.length} product${filteredFoods.length === 1 ? '' : 's'} shown`;
            grid.innerHTML = filteredFoods.map(f => {
                const preferringCats = userid ? getCatsThatPreferFood(f.foodid).filter(c => ownedCatIds.has(c.catid)) : [];
                const catTags = preferringCats.length > 0 
                    ? `<div class="food-cats-tags">${preferringCats.map(c => `<span class="food-cat-chip">${c.name || c.shelter_name || 'Cat'}</span>`).join('')}</div>`
                    : '';
                return `
                <div class="product-card">
                    <div class="product-card-img">
                        <img src="${f.image_url || ''}" alt="${f.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                        <span class="product-card-emoji" style="display:none">${f.emoji || '🍽️'}</span>
                    </div>
                    <div class="product-card-body">
                        <h4>${f.name}</h4>
                        <span class="food-type-badge ${getFoodDietType(f) === 'veg' ? 'veg' : 'non-veg'}">${getFoodDietType(f) === 'veg' ? '🌿 Veg' : '🍗 Non-Veg'}</span>
                        <span class="price">₹${f.price.toFixed(2)}</span>
                        <span class="stock ${f.qty <= 3 ? 'low' : ''}">${f.qty > 0 ? f.qty + ' in stock' : 'Out of stock'}</span>
                        ${catTags}
                        <button class="add-cart-btn" ${f.qty <= 0 || !userid ? 'disabled' : ''} onclick="handleAddToCart(${f.foodid})">
                            ${!userid ? 'Login to Buy' : (f.qty > 0 ? 'Add to Cart' : 'Out of Stock')}
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function renderOwnedCatsFilter() {
            const wrap = document.getElementById('owned-cats-filter-wrap');
            const container = document.getElementById('owned-cats-filter');
            const ownedCats = getOwnedCats();
            if (ownedCats.length === 0) {
                wrap.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            wrap.style.display = '';
            container.innerHTML = ownedCats.map(cat => {
                const active = storeFilters.selectedCats.has(cat.catid) ? ' active' : '';
                const label = cat.name || cat.shelter_name || 'Cat';
                return `<button class="chip${active}" onclick="toggleOwnedCatFilter(${cat.catid})">${label}</button>`;
            }).join('');
        }

        function toggleOwnedCatFilter(catid) {
            const id = parseInt(catid);
            if (storeFilters.selectedCats.has(id)) storeFilters.selectedCats.delete(id);
            else storeFilters.selectedCats.add(id);
            renderOwnedCatsFilter();
            renderProducts();
        }

        function setFoodSearch(val) { storeFilters.search = val || ''; renderProducts(); }
        function setDietFilter(val, btn) {
            storeFilters.diet = val || 'all';
            document.querySelectorAll('#store-diet-filter .toggle-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderProducts();
        }
        function setStockFilter(val, btn) {
            storeFilters.stock = val || 'all';
            document.querySelectorAll('#store-stock-filter .toggle-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderProducts();
        }
        function setStoreSort(val) { storeFilters.sort = val || 'name-asc'; renderProducts(); }
        function resetStoreFilters() {
            storeFilters = { search: '', diet: 'all', stock: 'all', sort: 'name-asc', selectedCats: new Set() };
            document.getElementById('food-search').value = '';
            document.getElementById('store-sort').value = 'name-asc';
            const dietDefault = document.querySelector('#store-diet-filter .toggle-btn[data-val="all"]');
            const stockDefault = document.querySelector('#store-stock-filter .toggle-btn[data-val="all"]');
            document.querySelectorAll('#store-diet-filter .toggle-btn, #store-stock-filter .toggle-btn').forEach(b => b.classList.remove('active'));
            if (dietDefault) dietDefault.classList.add('active');
            if (stockDefault) stockDefault.classList.add('active');
            renderOwnedCatsFilter();
            renderProducts();
        }

        function toggleStoreFilterSidebar() {
            document.getElementById('store-filter-sidebar').classList.toggle('open');
            document.getElementById('store-filter-overlay').classList.toggle('show');
        }

        /* ---- Cart Functions ---- */
        function handleAddToCart(foodid, fromSuggested = false) {
            if (!userid) return;
            addToCart(userid, foodid, 1);
            showToast('Added to cart!', 'success');
            if (fromSuggested) pauseCarouselByUser();
            renderCart();
            renderProducts();
            if (!fromSuggested) renderSuggested();
        }

        function renderCart() {
            if (!userid) return;
            const items = getCart(userid);
            const body = document.getElementById('cart-body');
            const footer = document.getElementById('cart-footer');
            const countEl = document.getElementById('cart-count');

            if (items.length === 0) {
                body.innerHTML = '<p class="cart-empty">Your cart is empty</p>';
                footer.style.display = 'none';
                countEl.style.display = 'none';
                return;
            }

            countEl.style.display = '';
            countEl.textContent = items.reduce((s, i) => s + i.quantity, 0);

            let total = 0;
            body.innerHTML = items.map(item => {
                const food = getFoodById(item.foodid);
                if (!food) return '';
                const subtotal = food.price * item.quantity;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            ${food.image_url ? `<img src="${food.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px" onerror="this.outerHTML='${food.emoji || '🍽️'}'">` : (food.emoji || '🍽️')}
                        </div>
                        <div class="cart-item-info">
                            <h4>${food.name}</h4>
                            <span class="cart-item-price">₹${food.price.toFixed(2)} × ${item.quantity}</span>
                        </div>
                        <div class="cart-item-qty">
                            <button onclick="changeQty(${item.cartid},-1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="changeQty(${item.cartid},1)">+</button>
                        </div>
                        <button class="cart-item-remove" onclick="removeItem(${item.cartid})">✕</button>
                    </div>`;
            }).join('');

            footer.style.display = '';
            document.getElementById('cart-total-amount').textContent = '₹' + total.toFixed(2);
        }

        function changeQty(cartId, delta) {
            const items = getCart(userid);
            const item = items.find(i => i.cartid === cartId);
            if (!item) return;
            const newQty = item.quantity + delta;
            if (newQty <= 0) { removeFromCart(cartId); }
            else { updateCartItem(cartId, newQty); }
            renderCart();
        }

        function removeItem(cartId) {
            removeFromCart(cartId);
            renderCart();
        }

        function openCart() {
            document.getElementById('cart-flyout').classList.add('open');
            document.getElementById('cart-overlay').classList.add('show');
        }
        function closeCart() {
            document.getElementById('cart-flyout').classList.remove('open');
            document.getElementById('cart-overlay').classList.remove('show');
        }

        function openCheckoutModal() {
            if (!userid) return;
            const items = getCart(userid);
            if (items.length === 0) {
                showToast('Your cart is empty', 'error');
                return;
            }
            closeCart();
            document.getElementById('checkout-address').value = (user && user.address) ? user.address : '';
            document.getElementById('checkout-note').value = '';
            document.querySelectorAll('input[name="checkout-method"]').forEach(el => {
                el.checked = el.value === 'home_delivery';
            });
            onCheckoutMethodChange();
            document.getElementById('checkout-modal').classList.add('show');
        }

        function closeCheckoutModal() {
            document.getElementById('checkout-modal').classList.remove('show');
        }

        function onCheckoutMethodChange() {
            const selected = document.querySelector('input[name="checkout-method"]:checked');
            const method = selected ? selected.value : 'home_delivery';
            const addressWrap = document.getElementById('checkout-address-wrap');
            addressWrap.style.display = method === 'home_delivery' ? '' : 'none';
        }

        function getFulfillmentLabel(method) {
            if (method === 'store_pickup') return 'Store Pickup';
            if (method === 'store_visit') return 'Store Visit';
            return 'Home Delivery';
        }

        function handleCheckout() {
            if (!userid) return;
            const selected = document.querySelector('input[name="checkout-method"]:checked');
            const method = selected ? selected.value : 'home_delivery';
            const address = document.getElementById('checkout-address').value.trim();
            const note = document.getElementById('checkout-note').value.trim();

            if (method === 'home_delivery' && !address) {
                showToast('Please enter delivery address', 'error');
                return;
            }

            const result = checkout(userid, {
                fulfillment_method: method,
                delivery_address: method === 'home_delivery' ? address : '',
                customer_note: note
            });
            if (result.success) {
                showToast(`🎉 Order placed (${getFulfillmentLabel(method)})`, 'success');
                closeCheckoutModal();
                closeCart();
                renderCart();
                renderProducts();
                renderSuggested();
                renderOwnedCatsFilter();
            } else {
                showToast('❌ ' + (result.error || 'Checkout failed'), 'error');
            }
        }

        function getUserPurchases(uid) {
            const purchases = JSON.parse(localStorage.getItem('meowtopia_purchases')) || [];
            return purchases.filter(p => p.userid === parseInt(uid)).sort((a, b) => new Date(b.purchase_date) - new Date(a.purchase_date));
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            const purchases = getUserPurchases(userid);
            if (purchases.length === 0) {
                list.innerHTML = '<p class="text-center" style="color:var(--text-light)">No orders yet.</p>';
                return;
            }
            list.innerHTML = purchases.map(order => {
                const date = new Date(order.purchase_date).toLocaleString();
                const methodLabel = getFulfillmentLabel(order.fulfillment_method || 'home_delivery');
                const items = (order.items || []).map(it => `<li>${it.name} × ${it.quantity}</li>`).join('');
                const addressBlock = order.fulfillment_method === 'home_delivery' && order.delivery_address
                    ? `<p><strong>Address:</strong> ${order.delivery_address}</p>`
                    : '';
                const noteBlock = order.customer_note
                    ? `<p><strong>Note:</strong> ${order.customer_note}</p>`
                    : '';
                return `
                    <div class="order-card">
                        <div class="order-card-head">
                            <strong>Order #${order.purchaseid}</strong>
                            <span>${date}</span>
                        </div>
                        <p><strong>Method:</strong> ${methodLabel}</p>
                        ${addressBlock}
                        ${noteBlock}
                        <ul class="order-items">${items}</ul>
                        <p class="order-total">Total: ₹${Number(order.total_amount || 0).toFixed(2)}</p>
                    </div>
                `;
            }).join('');
        }

        function openOrders() {
            if (!userid) {
                showToast('Please login to view orders', 'error');
                return;
            }
            renderOrders();
            document.getElementById('orders-modal').classList.add('show');
        }

        function closeOrders() {
            document.getElementById('orders-modal').classList.remove('show');
        }

        /* ---- Carousel auto-scroll for suggested ---- */
        function pauseCarouselByUser() {
            isCarouselPausedByUser = true;
            if (carouselInterval) {
                clearInterval(carouselInterval);
                carouselInterval = null;
            }
        }

        function startCarouselTimer() {
            const slides = document.querySelectorAll('#suggested-products .carousel-slide');
            if (slides.length <= 1 || isCarouselPausedByUser) return;
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                carouselIndex = (carouselIndex + 1) % slides.length;
                updateCarousel();
            }, 4000);
        }

        function initCarousel(preferredIndex) {
            const track = document.getElementById('suggested-products');
            const slides = track.querySelectorAll('.carousel-slide');
            const dotsContainer = document.getElementById('carousel-dots');
            const prevBtn = document.getElementById('carousel-prev');
            const nextBtn = document.getElementById('carousel-next');
            if (slides.length === 0) {
                dotsContainer.innerHTML = '';
                if (prevBtn) prevBtn.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                return;
            }

            if (prevBtn) prevBtn.style.display = slides.length > 1 ? '' : 'none';
            if (nextBtn) nextBtn.style.display = slides.length > 1 ? '' : 'none';

            // Build dots
            dotsContainer.innerHTML = Array.from(slides).map((_, i) =>
                `<button class="carousel-dot${i === 0 ? ' active' : ''}" onclick="goToSlide(${i}, true)"></button>`
            ).join('');
            dotsContainer.style.display = slides.length > 1 ? 'flex' : 'none';

            if (typeof preferredIndex === 'number') carouselIndex = preferredIndex;
            if (carouselIndex > slides.length - 1) carouselIndex = slides.length - 1;
            if (carouselIndex < 0) carouselIndex = 0;
            updateCarousel();
            startCarouselTimer();
        }

        function updateCarousel() {
            const track = document.getElementById('suggested-products');
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
        }

        function goToSlide(i, userInitiated) {
            if (userInitiated) pauseCarouselByUser();
            carouselIndex = i;
            updateCarousel();
            startCarouselTimer();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('#suggested-products .carousel-slide');
            if (slides.length <= 1) return;
            pauseCarouselByUser();
            carouselIndex = (carouselIndex - 1 + slides.length) % slides.length;
            updateCarousel();
        }

        function nextSlide() {
            const slides = document.querySelectorAll('#suggested-products .carousel-slide');
            if (slides.length <= 1) return;
            pauseCarouselByUser();
            carouselIndex = (carouselIndex + 1) % slides.length;
            updateCarousel();
        }

        /* ---- Init ---- */
        renderSuggested();
        renderOwnedCatsFilter();
        renderProducts();
        renderCart();

        const suggestedBar = document.getElementById('suggested-bar');
        if (suggestedBar) {
            suggestedBar.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.sparkle-card') || e.target.closest('.add-cart-btn')) {
                    pauseCarouselByUser();
                }
            });
        }
    </script>
</body>
</html>
