<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="form-page">
        <div class="form-card wide">
            <h2>Join Meowtopia! 🐱</h2>
            <p class="form-subtitle">Create your account and start your adoption journey</p>

            <div id="register-alert"></div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" placeholder="Re-enter password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="1234567890">
                </div>

                <div class="form-group">
                    <label for="address">Address (for delivery)</label>
                    <textarea id="address" placeholder="Your address for home delivery of adopted cats"></textarea>
                </div>

                <button type="submit" class="form-submit">Create Account 🐾</button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('register');

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = '../index.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            const alertDiv = document.getElementById('register-alert');
            
            const fullName = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            // Validation
            if (password !== confirmPassword) {
                alertDiv.innerHTML = '<div class="alert alert-error">Passwords do not match!</div>';
                return;
            }

            if (password.length < 6) {
                alertDiv.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters!</div>';
                return;
            }

            const result = registerUser({
                full_name: fullName,
                email: email,
                password: password,
                phone: phone,
                address: address
            });

            if (result.success) {
                alertDiv.innerHTML = '<div class="alert alert-success">Account created successfully! Redirecting to login... 🐾</div>';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
            } else {
                alertDiv.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
            }
        }
    </script>
</body>
</html>
