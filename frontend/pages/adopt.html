<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Cat — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="form-page">
        <div id="adopt-content"></div>
    </main>

    <!-- Success Modal -->
    <div class="modal-backdrop" id="adoption-modal">
        <div class="modal" style="text-align:center">
            <div id="modal-emoji" style="font-size:3rem;margin-bottom:.8rem">🎉</div>
            <h2 id="modal-title">Congratulations!</h2>
            <p id="modal-message" style="color:var(--text-light);margin:.6rem 0"></p>
            <a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.6rem;border-radius:8px">Browse More Cats 🐾</a>
            <br>
            <a href="../index.html" class="btn-outline" style="display:inline-block;padding:.5rem 1.2rem;border-radius:8px;margin-top:.6rem">Back to Home</a>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('adopt');

        const user = getCurrentUser();
        const catid = getParam('id');
        const cat = getCatById(catid);
        const content = document.getElementById('adopt-content');
        const returnTo = encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);

        function esc(v) {
            return String(v ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        if (!user) {
            content.innerHTML = `<div class="form-card text-center"><h2>🔐 Login Required</h2><p>You need to be logged in to adopt a cat!</p><a href="login.html?redirect=${returnTo}" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Login Now</a></div>`;
        } else if (!cat) {
            content.innerHTML = `<div class="form-card text-center"><h2>😿 Cat Not Found</h2><p>This cat may no longer be available.</p><a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Browse Cats</a></div>`;
        } else if (!cat.is_available) {
            content.innerHTML = `<div class="form-card text-center"><h2>💕 Already Adopted</h2><p>This lucky kitty already found a home!</p><a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Browse Other Cats</a></div>`;
        } else {
            const age = formatAge(cat.dob);
            try {
                content.innerHTML = `
                    <!-- Cat Preview -->
                    <div class="cat-preview">
                        <div class="cat-preview-img">${getCatImageHTML(cat)}</div>
                        <div class="cat-preview-info">
                            <h3>${esc(cat.shelter_name)}</h3>
                            <p>${esc(cat.breed)} · ${esc(age)} · ${esc(cat.gender)}</p>
                            <p>${esc(cat.cattitude)}</p>
                        </div>
                    </div>

                    <div class="form-card">
                        <h2>Complete Your Adoption 💕</h2>
                        <div id="adopt-alert"></div>

                        <form id="adoption-form" onsubmit="handleAdoption(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Your Name</label>
                                    <input type="text" value="${esc(user.full_name)}" readonly style="opacity:.7">
                                </div>
                                <div class="form-group">
                                    <label>Your Phone</label>
                                    <input type="text" id="phone" value="${esc(user.phone || '')}" placeholder="Phone number" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Your Address</label>
                                <textarea id="address" placeholder="Address for delivery" required>${esc(user.address || '')}</textarea>
                            </div>

                            <div class="form-group">
                                <label>Name for your new fur baby 🐱</label>
                                <input type="text" id="cat_name" placeholder="Leave blank to keep &quot;${esc(cat.shelter_name)}&quot;">
                                <small style="color:var(--text-muted)">Leave blank to keep the shelter name, or give your companion a special name!</small>
                            </div>

                            <div class="form-group">
                                <label>How would you like to receive your cat?</label>
                                <input type="hidden" id="pickup_method" value="pickup">
                                <div class="pickup-method-buttons" style="display:flex;gap:.7rem;flex-wrap:wrap;margin-top:.3rem">
                                    <button type="button" class="pickup-method-btn active" onclick="setPickupMethod('pickup', this)">🏪 Store Pickup</button>
                                    <button type="button" class="pickup-method-btn" onclick="setPickupMethod('delivery', this)">🏠 Home Delivery</button>
                                </div>
                            </div>

                            <button type="submit" class="form-submit">Complete Adoption 🐾</button>
                        </form>
                    </div>`;
            } catch (err) {
                content.innerHTML = `<div class="form-card text-center"><h2>⚠️ Oops</h2><p>We couldn't load this adoption form safely. Please go back and try again.</p><a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Back to Cats</a></div>`;
            }
        }

        function handleAdoption(e) {
            e.preventDefault();
            const catNameInput = document.getElementById('cat_name').value.trim();
            const catName = catNameInput || cat.shelter_name;
            const pickupMethod = document.getElementById('pickup_method').value;

            createAdoption({
                userid: user.userid,
                catid: parseInt(catid),
                cat_name_given: catName,
                pickup_method: pickupMethod
            });


            document.getElementById('modal-emoji').textContent = pickupMethod === 'pickup' ? '🏪' : '🚗';
            document.getElementById('modal-title').textContent = pickupMethod === 'pickup'
                ? `You're adopting ${catName}!`
                : `${catName} is on the way!`;
            document.getElementById('modal-message').textContent = pickupMethod === 'pickup'
                ? `We can't wait to see you at Meowtopia! ${catName} is all ready.`
                : `Get ready — ${catName} is being prepared for the journey home!`;

            document.getElementById('adoption-modal').classList.add('show');
        }

        function setPickupMethod(method, btn) {
            document.getElementById('pickup_method').value = method;
            document.querySelectorAll('.pickup-method-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        document.getElementById('adoption-modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
    </script>
</body>
</html>
