<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Cat — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="form-page">
        <div id="adopt-content"></div>
    </main>

    <!-- Success Modal -->
    <div class="modal-backdrop" id="adoption-modal">
        <div class="modal" style="text-align:center">
            <div id="modal-emoji" style="font-size:3rem;margin-bottom:.8rem">🎉</div>
            <h2 id="modal-title">Congratulations!</h2>
            <p id="modal-message" style="color:var(--text-light);margin:.6rem 0"></p>
            <div id="modal-food-tip" style="background:var(--surface-alt);padding:1rem;border-radius:8px;margin:1rem 0;font-size:.9rem"></div>
            <a href="dashboard.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.6rem;border-radius:8px">Go to My Cats 🏡</a>
            <br>
            <a href="../index.html" class="btn-outline" style="display:inline-block;padding:.5rem 1.2rem;border-radius:8px;margin-top:.6rem">Back to Home</a>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('adopt');

        const user = getCurrentUser();
        const catid = getParam('id');
        const cat = getCatById(catid);
        const content = document.getElementById('adopt-content');

        if (!user) {
            content.innerHTML = `<div class="form-card text-center"><h2>🔐 Login Required</h2><p>You need to be logged in to adopt a cat!</p><a href="login.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Login Now</a></div>`;
        } else if (!cat) {
            content.innerHTML = `<div class="form-card text-center"><h2>😿 Cat Not Found</h2><p>This cat may no longer be available.</p><a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Browse Cats</a></div>`;
        } else if (!cat.is_available) {
            content.innerHTML = `<div class="form-card text-center"><h2>💕 Already Adopted</h2><p>This lucky kitty already found a home!</p><a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Browse Other Cats</a></div>`;
        } else {
            const age = formatAge(cat.dob);
            content.innerHTML = `
                <!-- Cat Preview -->
                <div class="cat-preview">
                    <div class="cat-preview-img">${getCatImageHTML(cat)}</div>
                    <div class="cat-preview-info">
                        <h3>${cat.shelter_name}</h3>
                        <p>${cat.breed} · ${age} · ${cat.gender}</p>
                        <p>${cat.cattitude}</p>
                    </div>
                </div>

                <div class="form-card">
                    <h2>Complete Your Adoption 💕</h2>
                    <div id="adopt-alert"></div>

                    <form id="adoption-form" onsubmit="handleAdoption(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Your Name</label>
                                <input type="text" value="${user.full_name}" readonly style="opacity:.7">
                            </div>
                            <div class="form-group">
                                <label>Your Phone</label>
                                <input type="text" id="phone" value="${user.phone || ''}" placeholder="Phone number" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Your Address</label>
                            <textarea id="address" placeholder="Address for delivery" required>${user.address || ''}</textarea>
                        </div>

                        <div class="form-group">
                            <label>Name for your new fur baby 🐱</label>
                            <input type="text" id="cat_name" placeholder="e.g., Whiskers, Luna, Mochi..." required>
                            <small style="color:var(--text-muted)">Give your new companion a special name!</small>
                        </div>

                        <div class="form-group">
                            <label>How would you like to receive your cat?</label>
                            <div style="display:flex;gap:1rem;margin-top:.3rem">
                                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-weight:600">
                                    <input type="radio" name="pickup_method" value="pickup" checked> 🏪 Store Pickup
                                </label>
                                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-weight:600">
                                    <input type="radio" name="pickup_method" value="delivery"> 🏠 Home Delivery
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="form-submit">Complete Adoption 🐾</button>
                    </form>
                </div>`;
        }

        function handleAdoption(e) {
            e.preventDefault();
            const catName = document.getElementById('cat_name').value.trim();
            const pickupMethod = document.querySelector('input[name="pickup_method"]:checked').value;

            if (!catName) {
                document.getElementById('adopt-alert').innerHTML = '<p style="color:#d63031;font-weight:700">Please give your cat a name!</p>';
                return;
            }

            createAdoption({
                userid: user.userid,
                catid: parseInt(catid),
                cat_name_given: catName,
                pickup_method: pickupMethod
            });

            const foodPrefs = getCatFoodPrefs(catid);
            const foodNames = foodPrefs.map(f => f.name).join(' and ') || 'some delicious treats';

            document.getElementById('modal-emoji').textContent = pickupMethod === 'pickup' ? '🏪' : '🚗';
            document.getElementById('modal-title').textContent = pickupMethod === 'pickup'
                ? `You're adopting ${catName}!`
                : `${catName} is on the way!`;
            document.getElementById('modal-message').textContent = pickupMethod === 'pickup'
                ? `We can't wait to see you at Meowtopia! ${catName} is all ready.`
                : `Get ready — ${catName} is being prepared for the journey home!`;
            document.getElementById('modal-food-tip').innerHTML = `🐾 Don't forget <strong>${foodNames}</strong> for <strong>${catName}</strong>!`;

            document.getElementById('adoption-modal').classList.add('show');
        }

        document.getElementById('adoption-modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
    </script>
</body>
</html>
