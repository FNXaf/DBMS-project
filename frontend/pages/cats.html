<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Cats — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="section">
        <h1 class="section-title">Browse Our Cats 🐱</h1>

        <div class="browse-layout">
            <!-- Filter toggle — always visible -->
            <button class="filter-toggle-btn" onclick="toggleFilterSidebar()">☰ Filters</button>
            <div class="filter-overlay" id="filter-overlay" onclick="toggleFilterSidebar()"></div>

            <!-- FILTER SIDEBAR (popup from left) -->
            <aside class="filter-sidebar" id="filter-sidebar">
                <div class="filter-sidebar-header">
                    <h3>Filters</h3>
                    <div>
                        <button class="filter-clear-btn" onclick="clearAllFilters()">Clear All</button>
                        <button class="filter-close" onclick="toggleFilterSidebar()">✕</button>
                    </div>
                </div>

                <!-- Gender — always visible -->
                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Gender</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="toggle-group" id="fg-gender">
                            <button class="toggle-btn" data-val="Male" onclick="toggleSingle(this)">♂ Male</button>
                            <button class="toggle-btn" data-val="Female" onclick="toggleSingle(this)">♀ Female</button>
                        </div>
                    </div>
                </div>

                <!-- Age — always visible, dual-range slider -->
                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Age</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="dual-range" id="age-range">
                            <div class="dual-range-track">
                                <div class="dual-range-fill" id="age-fill"></div>
                            </div>
                            <input type="range" id="age-min" min="0" max="240" value="0" oninput="syncAgeSlider()">
                            <input type="range" id="age-max" min="0" max="240" value="240" oninput="syncAgeSlider()">
                            <div class="dual-range-labels">
                                <span id="age-min-label">0 mo</span>
                                <span id="age-max-label">240 mo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Fur Color — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Fur Color</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-fur-wrap">
                        <div class="chip-group" id="fg-fur"></div>
                    </div>
                </div>

                <!-- Breed — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Breed</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-breed-wrap">
                        <div class="chip-group" id="fg-breed"></div>
                    </div>
                </div>

                <!-- Cattitude — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Cattitude</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-cattitude-wrap">
                        <div class="chip-group" id="fg-cattitude"></div>
                    </div>
                </div>

                <!-- Health — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Health</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-health-wrap">
                        <div class="toggle-group" id="fg-health">
                            <button class="toggle-btn" data-val="Healthy" onclick="toggleSingle(this)">✅ Healthy</button>
                            <button class="toggle-btn" data-val="Needs Care" onclick="toggleSingle(this)">🩺 Needs Care</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <div class="browse-main">
                <div class="sort-bar">
                    <span class="results-count" id="results-count"></span>
                    <select id="sort-by" onchange="applyFilters()">
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                        <option value="age-asc">Youngest First</option>
                        <option value="age-desc">Oldest First</option>
                        <option value="breed-asc">Breed A-Z</option>
                    </select>
                </div>

                <div class="cats-grid" id="cat-grid"></div>

                <!-- Empty State -->
                <div id="empty-state" style="display:none;text-align:center;padding:3rem 1rem">
                    <div style="font-size:3rem">😿</div>
                    <h3>No cats match your filters</h3>
                    <p style="color:var(--text-light)">Try changing your filter options to find more cuties!</p>
                    <button class="btn-primary mt-2" onclick="clearAllFilters()">Show All Cats</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('cats');

        /* ---- Populate filter chips ---- */
        const allCats = getCats();
        const uniq = (arr) => [...new Set(arr)].sort();

        function buildChips(containerId, values, useGradient) {
            const c = document.getElementById(containerId);
            c.innerHTML = values.map(v => {
                const grad = useGradient ? furColorGradient(v) : '';
                return `<button class="chip" data-val="${v}" data-gradient="${grad}" onclick="toggleChip(this)">${v}</button>`;
            }).join('');
        }
        buildChips('fg-fur', uniq(allCats.map(c => c.fur_color)), true);
        buildChips('fg-breed', uniq(allCats.map(c => c.breed)), false);
        buildChips('fg-cattitude', uniq(allCats.map(c => c.cattitude)), false);

        /* ---- Toggle helpers ---- */
        function toggleSingle(btn) {
            const isActive = btn.classList.contains('active');
            btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            if (!isActive) btn.classList.add('active');
            applyFilters();
        }
        function toggleChip(btn) {
            btn.classList.toggle('active');
            // Apply gradient bg for fur-color chips
            if (btn.dataset.gradient && btn.classList.contains('active')) {
                btn.style.background = btn.dataset.gradient;
                btn.style.borderColor = 'transparent';
                btn.style.color = '#fff';
                btn.style.textShadow = '0 1px 3px rgba(0,0,0,.25)';
            } else {
                btn.style.background = '';
                btn.style.borderColor = '';
                btn.style.color = '';
                btn.style.textShadow = '';
            }
            applyFilters();
        }
        function getActiveVals(containerId) {
            return [...document.getElementById(containerId).querySelectorAll('.active')].map(b => b.dataset.val);
        }
        function getSingleVal(containerId) {
            const a = document.getElementById(containerId).querySelector('.active');
            return a ? a.dataset.val : '';
        }

        /* ---- Sidebar popup toggle ---- */
        function toggleFilterSidebar() {
            document.getElementById('filter-sidebar').classList.toggle('open');
            document.getElementById('filter-overlay').classList.toggle('show');
        }

        /* ---- Accordion toggle ---- */
        function toggleAccordion(headerEl) {
            const body = headerEl.nextElementSibling;
            const isOpen = body.classList.contains('open');
            headerEl.classList.toggle('expanded', !isOpen);
            body.classList.toggle('open', !isOpen);
        }

        /* ---- Dual-range age slider sync ---- */
        function syncAgeSlider() {
            const minEl = document.getElementById('age-min');
            const maxEl = document.getElementById('age-max');
            let minV = parseInt(minEl.value);
            let maxV = parseInt(maxEl.value);
            if (minV > maxV) { [minV, maxV] = [maxV, minV]; minEl.value = minV; maxEl.value = maxV; }
            const pct = v => (v / 240) * 100;
            document.getElementById('age-fill').style.left = pct(minV) + '%';
            document.getElementById('age-fill').style.width = pct(maxV - minV) + '%';
            const label = v => v < 12 ? v + ' mo' : Math.floor(v / 12) + ' yr' + (v % 12 ? ' ' + (v % 12) + 'mo' : '');
            document.getElementById('age-min-label').textContent = label(minV);
            document.getElementById('age-max-label').textContent = label(maxV);
            applyFilters();
        }
        syncAgeSlider(); // init fill bar

        /* ---- Clear All ---- */
        function clearAllFilters() {
            document.querySelectorAll('.toggle-btn.active, .chip.active').forEach(b => {
                b.classList.remove('active');
                b.style.background = '';
                b.style.borderColor = '';
                b.style.color = '';
                b.style.textShadow = '';
            });
            document.getElementById('age-min').value = 0;
            document.getElementById('age-max').value = 240;
            syncAgeSlider();
            applyFilters();
        }

        /* ---- Apply Filters & Sort ---- */
        function applyFilters() {
            let cats = getAvailableCats();

            // Gender
            const gender = getSingleVal('fg-gender');
            if (gender) cats = cats.filter(c => c.gender === gender);

            // Fur color
            const furs = getActiveVals('fg-fur');
            if (furs.length) cats = cats.filter(c => furs.includes(c.fur_color));

            // Breed
            const breeds = getActiveVals('fg-breed');
            if (breeds.length) cats = cats.filter(c => breeds.includes(c.breed));

            // Age range (months)
            const ageMin = parseInt(document.getElementById('age-min').value) || 0;
            const ageMax = parseInt(document.getElementById('age-max').value) || 240;
            const [lo, hi] = ageMin <= ageMax ? [ageMin, ageMax] : [ageMax, ageMin];
            cats = cats.filter(c => {
                const m = getAgeMonths(c.dob);
                return m >= lo && m <= hi;
            });

            // Cattitude
            const catts = getActiveVals('fg-cattitude');
            if (catts.length) cats = cats.filter(c => catts.includes(c.cattitude));

            // Health — map actual statuses to filter categories
            const health = getSingleVal('fg-health');
            if (health === 'Healthy') {
                cats = cats.filter(c => c.health_status === 'Healthy' || c.health_status === 'Vaccinated');
            } else if (health === 'Needs Care') {
                cats = cats.filter(c => c.health_status === 'Under Treatment');
            }

            // Sort
            const sort = document.getElementById('sort-by').value;
            cats.sort((a, b) => {
                switch(sort) {
                    case 'name-asc': return (a.shelter_name || '').localeCompare(b.shelter_name || '');
                    case 'name-desc': return (b.shelter_name || '').localeCompare(a.shelter_name || '');
                    case 'age-asc': return getAgeMonths(a.dob) - getAgeMonths(b.dob);
                    case 'age-desc': return getAgeMonths(b.dob) - getAgeMonths(a.dob);
                    case 'breed-asc': return a.breed.localeCompare(b.breed);
                    default: return 0;
                }
            });

            renderCats(cats);
        }

        function renderCats(cats) {
            const grid = document.getElementById('cat-grid');
            const empty = document.getElementById('empty-state');
            const count = document.getElementById('results-count');

            if (cats.length === 0) {
                grid.innerHTML = '';
                grid.style.display = 'none';
                empty.style.display = 'block';
                count.textContent = '';
            } else {
                grid.style.display = '';
                empty.style.display = 'none';
                count.textContent = `Showing ${cats.length} adorable cat${cats.length !== 1 ? 's' : ''} 🐾`;
                grid.innerHTML = cats.map(cat => createCatCard(cat, '../')).join('');
            }
        }

        applyFilters();
    </script>
</body>
</html>
