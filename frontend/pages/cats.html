<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Cats — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="section">

        <div class="browse-layout">
            <!-- Filter toggle — always visible -->
            <button class="filter-toggle-btn" onclick="toggleFilterSidebar()">☰ Filters</button>
            <div class="filter-overlay" id="filter-overlay" onclick="toggleFilterSidebar()"></div>

            <!-- FILTER SIDEBAR (popup from left) -->
            <aside class="filter-sidebar" id="filter-sidebar">
                <div class="filter-sidebar-header">
                    <h3>Filters</h3>
                    <div>
                        <button class="filter-clear-btn" onclick="clearAllFilters()">Clear All</button>
                        <button class="filter-close" onclick="toggleFilterSidebar()">✕</button>
                    </div>
                </div>

                <!-- Gender — always visible -->
                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Gender</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="toggle-group" id="fg-gender">
                            <button class="toggle-btn" data-val="Male" onclick="toggleSingle(this)">♂ Male</button>
                            <button class="toggle-btn" data-val="Female" onclick="toggleSingle(this)">♀ Female</button>
                        </div>
                    </div>
                </div>

                <!-- Age — always visible, dual-range slider -->
                <div class="filter-group">
                    <div class="filter-group-header" style="cursor:default">
                        <label>Age</label>
                    </div>
                    <div class="filter-group-body always-open">
                        <div class="dual-range" id="age-range">
                            <div class="dual-range-track">
                                <div class="dual-range-fill" id="age-fill"></div>
                            </div>
                            <input type="range" id="age-min" min="0" max="240" value="0" oninput="syncAgeSlider()">
                            <input type="range" id="age-max" min="0" max="240" value="240" oninput="syncAgeSlider()">
                            <div class="dual-range-labels">
                                <span id="age-min-label">0 mo</span>
                                <span id="age-max-label">240 mo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Fur Color — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Fur Color</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-fur-wrap">
                        <div class="chip-group" id="fg-fur"></div>
                    </div>
                </div>

                <!-- Breed — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Breed</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-breed-wrap">
                        <div class="chip-group" id="fg-breed"></div>
                    </div>
                </div>

                <!-- Cattitude — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Cattitude</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-cattitude-wrap">
                        <div class="chip-group" id="fg-cattitude"></div>
                    </div>
                </div>

                <!-- Health — collapsible accordion -->
                <div class="filter-group">
                    <div class="filter-group-header" onclick="toggleAccordion(this)">
                        <label>Health</label>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="filter-group-body" id="fg-health-wrap">
                        <div class="toggle-group" id="fg-health">
                            <button class="toggle-btn" data-val="Healthy" onclick="toggleSingle(this)">✅ Healthy</button>
                            <button class="toggle-btn" data-val="Needs Care" onclick="toggleSingle(this)">🩺 Needs Care</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <div class="browse-main">
                <div class="sort-bar">
                    <select id="sort-by" onchange="applyFilters()">
                        <option value="age-asc">Age: Youngest First</option>
                        <option value="age-desc">Age: Oldest First</option>
                        <option value="date-desc">Date Added: Newest First</option>
                        <option value="date-asc">Date Added: Oldest First</option>
                        <option value="gender-asc">Gender: Female First</option>
                        <option value="gender-desc">Gender: Male First</option>
                        <option value="breed-asc">Breed: A → Z</option>
                        <option value="breed-desc">Breed: Z → A</option>
                        <option value="health-vacc">Vaccination Status</option>
                        <option value="status-avail">Adoption Status: Available First</option>
                    </select>
                    <div class="view-switch-wrap">
                        <button class="view-mode-btn" id="view-mode-btn" onclick="toggleViewMenu()">
                            <span>View As</span>
                            <span id="view-mode-icon">🎞️</span>
                        </button>
                        <div class="view-mode-menu" id="view-mode-menu">
                            <button onclick="setViewMode('slide')">🎞️ Slide</button>
                            <button onclick="setViewMode('tiles')">🧩 Tiles</button>
                            <button onclick="setViewMode('list')">📋 List</button>
                        </div>
                    </div>
                </div>

                <div class="cats-grid" id="cat-grid"></div>

                <!-- Empty State -->
                <div id="empty-state" style="display:none;text-align:center;padding:3rem 1rem">
                    <div style="font-size:3rem">😿</div>
                    <h3>No cats match your filters</h3>
                    <p style="color:var(--text-light)">Try changing your filter options to find more cuties!</p>
                    <button class="btn-primary mt-2" onclick="clearAllFilters()">Show All Cats</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('cats');
        let currentViewMode = 'slide';
        let currentCats = [];
        let slideIndex = 0;
        let slideTouchStartX = 0;
        const viewIcon = { slide: '🎞️', tiles: '🧩', list: '📋' };

        /* ---- Populate filter chips ---- */
        const allCats = getCats();
        const uniq = (arr) => [...new Set(arr)].sort();

        function buildChips(containerId, values, useGradient) {
            const c = document.getElementById(containerId);
            c.innerHTML = values.map(v => {
                const grad = useGradient ? furColorGradient(v) : '';
                return `<button class="chip" data-val="${v}" data-gradient="${grad}" onclick="toggleChip(this)">${v}</button>`;
            }).join('');
        }
        buildChips('fg-fur', uniq(allCats.map(c => c.fur_color)), true);
        buildChips('fg-breed', uniq(allCats.map(c => c.breed)), false);
        buildChips('fg-cattitude', uniq(allCats.map(c => c.cattitude)), false);

        /* ---- Toggle helpers ---- */
        function toggleSingle(btn) {
            const isActive = btn.classList.contains('active');
            btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            if (!isActive) btn.classList.add('active');
            applyFilters();
        }
        function toggleChip(btn) {
            btn.classList.toggle('active');
            // Apply gradient bg for fur-color chips with adaptive text color
            if (btn.dataset.gradient && btn.classList.contains('active')) {
                btn.style.background = btn.dataset.gradient;
                btn.style.borderColor = 'transparent';
                
                // Get brightness from gradient (extract first color if possible)
                const colorMatch = btn.dataset.gradient.match(/#[\da-f]{6}/i);
                const hexColor = colorMatch ? colorMatch[0] : '#ffffff';
                const brightness = getColorBrightness(hexColor);
                
                // Set text color based on brightness
                if (brightness > 128) {
                    btn.style.color = '#000';
                    btn.style.textShadow = '0 1px 2px rgba(255,255,255,.3)';
                    btn.style.webkitTextStroke = 'none';
                } else {
                    btn.style.color = '#fff';
                    btn.style.textShadow = 'none';
                    btn.style.webkitTextStroke = '0.5px rgba(0,0,0,.45)';
                }
            } else {
                btn.style.background = '';
                btn.style.borderColor = '';
                btn.style.color = '';
                btn.style.textShadow = '';
                btn.style.webkitTextStroke = '';
            }
            applyFilters();
        }
        function getActiveVals(containerId) {
            return [...document.getElementById(containerId).querySelectorAll('.active')].map(b => b.dataset.val);
        }
        function getSingleVal(containerId) {
            const a = document.getElementById(containerId).querySelector('.active');
            return a ? a.dataset.val : '';
        }

        /* ---- Sidebar popup toggle ---- */
        function toggleFilterSidebar() {
            document.getElementById('filter-sidebar').classList.toggle('open');
            document.getElementById('filter-overlay').classList.toggle('show');
        }

        function toggleViewMenu() {
            document.getElementById('view-mode-menu').classList.toggle('open');
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            document.getElementById('view-mode-icon').textContent = viewIcon[mode] || '🎞️';
            document.getElementById('view-mode-menu').classList.remove('open');
            renderCats(currentCats);
        }

        /* ---- Accordion toggle ---- */
        function toggleAccordion(headerEl) {
            const body = headerEl.nextElementSibling;
            const isOpen = body.classList.contains('open');
            headerEl.classList.toggle('expanded', !isOpen);
            body.classList.toggle('open', !isOpen);
        }

        /* ---- Dual-range age slider sync ---- */
        function syncAgeSlider() {
            const minEl = document.getElementById('age-min');
            const maxEl = document.getElementById('age-max');
            let minV = parseInt(minEl.value);
            let maxV = parseInt(maxEl.value);
            if (minV > maxV) { [minV, maxV] = [maxV, minV]; minEl.value = minV; maxEl.value = maxV; }
            const pct = v => (v / 240) * 100;
            document.getElementById('age-fill').style.left = pct(minV) + '%';
            document.getElementById('age-fill').style.width = pct(maxV - minV) + '%';
            const label = v => v < 12 ? v + ' mo' : Math.floor(v / 12) + ' yr' + (v % 12 ? ' ' + (v % 12) + 'mo' : '');
            document.getElementById('age-min-label').textContent = label(minV);
            document.getElementById('age-max-label').textContent = label(maxV);
            applyFilters();
        }
        syncAgeSlider(); // init fill bar

        /* ---- Clear All ---- */
        function clearAllFilters() {
            document.querySelectorAll('.toggle-btn.active, .chip.active').forEach(b => {
                b.classList.remove('active');
                b.style.background = '';
                b.style.borderColor = '';
                b.style.color = '';
                b.style.textShadow = '';
                b.style.webkitTextStroke = '';
            });
            document.getElementById('age-min').value = 0;
            document.getElementById('age-max').value = 240;
            syncAgeSlider();
            applyFilters();
        }

        /* ---- Apply Filters & Sort ---- */
        function applyFilters() {
            let cats = getCats();

            // Gender
            const gender = getSingleVal('fg-gender');
            if (gender) cats = cats.filter(c => c.gender === gender);

            // Fur color
            const furs = getActiveVals('fg-fur');
            if (furs.length) cats = cats.filter(c => furs.includes(c.fur_color));

            // Breed
            const breeds = getActiveVals('fg-breed');
            if (breeds.length) cats = cats.filter(c => breeds.includes(c.breed));

            // Age range (months)
            const ageMin = parseInt(document.getElementById('age-min').value) || 0;
            const ageMax = parseInt(document.getElementById('age-max').value) || 240;
            const [lo, hi] = ageMin <= ageMax ? [ageMin, ageMax] : [ageMax, ageMin];
            cats = cats.filter(c => {
                const m = getAgeMonths(c.dob);
                return m >= lo && m <= hi;
            });

            // Cattitude
            const catts = getActiveVals('fg-cattitude');
            if (catts.length) cats = cats.filter(c => catts.includes(c.cattitude));

            // Health — map actual statuses to filter categories
            const health = getSingleVal('fg-health');
            if (health === 'Healthy') {
                cats = cats.filter(c => c.health_status === 'Healthy' || c.health_status === 'Vaccinated');
            } else if (health === 'Needs Care') {
                cats = cats.filter(c => c.health_status === 'Under Treatment');
            }

            // Sort
            const sort = document.getElementById('sort-by').value;
            cats.sort((a, b) => {
                switch(sort) {
                    case 'age-asc': return getAgeMonths(a.dob) - getAgeMonths(b.dob);
                    case 'age-desc': return getAgeMonths(b.dob) - getAgeMonths(a.dob);
                    case 'date-desc': return new Date(b.intake_date) - new Date(a.intake_date);
                    case 'date-asc': return new Date(a.intake_date) - new Date(b.intake_date);
                    case 'gender-asc': return (a.gender || '').localeCompare(b.gender || '');
                    case 'gender-desc': return (b.gender || '').localeCompare(a.gender || '');
                    case 'breed-asc': return a.breed.localeCompare(b.breed);
                    case 'breed-desc': return b.breed.localeCompare(a.breed);
                    case 'health-vacc': {
                        const order = {'Vaccinated': 0, 'Healthy': 1, 'Under Treatment': 2};
                        return (order[a.health_status] ?? 3) - (order[b.health_status] ?? 3);
                    }
                    case 'status-avail': {
                        if (a.is_available === b.is_available) return 0;
                        return a.is_available ? -1 : 1;
                    }
                    default: return 0;
                }
            });

            renderCats(cats);
        }

        function renderCats(cats) {
            const grid = document.getElementById('cat-grid');
            const empty = document.getElementById('empty-state');
            currentCats = cats;

            if (cats.length === 0) {
                grid.innerHTML = '';
                grid.style.display = 'none';
                empty.style.display = 'block';
            } else {
                grid.style.display = '';
                empty.style.display = 'none';
                if (currentViewMode === 'tiles') {
                    grid.className = 'cats-grid';
                    grid.innerHTML = cats.map(cat => createCatCard(cat, '../')).join('');
                } else if (currentViewMode === 'list') {
                    grid.className = 'cats-list';
                    grid.innerHTML = cats.map(cat => createCatListCard(cat)).join('');
                } else {
                    grid.className = 'cats-slide-mode';
                    if (slideIndex >= cats.length) slideIndex = 0;
                    const cat = cats[slideIndex];
                    grid.innerHTML = `
                        <div class="cat-slide-shell" id="cat-slide-shell">
                            <button class="cat-slide-arrow left" onclick="moveSlide(-1)">❮</button>
                            ${createCatSlideCard(cat, slideIndex + 1, cats.length)}
                            <button class="cat-slide-arrow right" onclick="moveSlide(1)">❯</button>
                        </div>
                    `;
                    bindSlideSwipe();
                }
            }
        }

        function createCatListCard(cat) {
            const age = formatAge(cat.dob);
            const status = cat.is_available
                ? '<span class="cat-card-badge">Available</span>'
                : '<span class="cat-card-badge unavailable">Adopted</span>';
            return `
                <div class="cat-list-card" onclick="window.location.href='cat-detail.html?id=${cat.catid}'">
                    <div class="cat-list-img" style="background:${furColorGradient(cat.fur_color)}">${getCatImageHTML(cat)}${status}</div>
                    <div class="cat-list-body">
                        <h3>${cat.shelter_name}</h3>
                        <p class="cat-card-breed">${cat.breed}</p>
                        <div class="cat-card-attrs">
                            <div class="cat-attr"><span class="attr-icon">⏳</span> ${age}</div>
                            <div class="cat-attr"><span class="attr-icon">${cat.gender === 'Male' ? '♂' : '♀'}</span> ${cat.gender}</div>
                            <div class="cat-attr"><span class="attr-icon">😸</span> ${cat.cattitude}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function createCatSlideCard(cat, n, total) {
            return `
                <div class="cat-slide-card" onclick="window.location.href='cat-detail.html?id=${cat.catid}'">
                    <div class="cat-slide-count">${n} / ${total}</div>
                    <div class="cat-slide-image" style="background:${furColorGradient(cat.fur_color)}">${getCatImageHTML(cat)}</div>
                    <div class="cat-slide-body">
                        <h3>${cat.shelter_name}</h3>
                        <p class="cat-card-breed">${cat.breed}</p>
                        <div class="cat-card-attrs">
                            <div class="cat-attr"><span class="attr-icon">⏳</span> ${formatAge(cat.dob)}</div>
                            <div class="cat-attr"><span class="attr-icon">${cat.gender === 'Male' ? '♂' : '♀'}</span> ${cat.gender}</div>
                            <div class="cat-attr"><span class="attr-icon">😸</span> ${cat.cattitude}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function moveSlide(delta) {
            if (!currentCats.length) return;
            slideIndex = (slideIndex + delta + currentCats.length) % currentCats.length;
            renderCats(currentCats);
        }

        function bindSlideSwipe() {
            const shell = document.getElementById('cat-slide-shell');
            if (!shell) return;
            shell.addEventListener('touchstart', (e) => {
                slideTouchStartX = e.changedTouches[0].clientX;
            }, { passive: true });
            shell.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientX - slideTouchStartX;
                if (Math.abs(diff) > 40) moveSlide(diff < 0 ? 1 : -1);
            }, { passive: true });
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('view-mode-menu');
            const btn = document.getElementById('view-mode-btn');
            if (!menu || !btn) return;
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('open');
            }
        });

        applyFilters();
    </script>
</body>
</html>
