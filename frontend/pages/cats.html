<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Cats — Meowtopia 🐾</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main>
        <div class="page-header">
            <h1>Browse Our Cats 🐱</h1>
            <p>Find your purrfect match from our adorable residents</p>
        </div>

        <section class="section">
            <div class="container">
                <!-- Filters -->
                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Breed</label>
                        <select id="filter-breed" onchange="applyFilters()">
                            <option value="">All Breeds</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Gender</label>
                        <select id="filter-gender" onchange="applyFilters()">
                            <option value="">All Genders</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Fur Color</label>
                        <select id="filter-fur" onchange="applyFilters()">
                            <option value="">All Colors</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Cattitude</label>
                        <select id="filter-cattitude" onchange="applyFilters()">
                            <option value="">All Personalities</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>&nbsp;</label>
                        <button class="btn btn-sm btn-accent" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>

                <!-- Results count -->
                <p id="results-count" style="margin-bottom: 16px; color: var(--text-light); font-weight: 600;"></p>

                <!-- Cat Grid -->
                <div class="cat-grid" id="cat-grid"></div>

                <!-- Empty State -->
                <div class="empty-state" id="empty-state" style="display: none;">
                    <div class="empty-emoji">😿</div>
                    <h3>No cats match your filters</h3>
                    <p>Try changing your filter options to find more cuties!</p>
                    <button class="btn btn-primary mt-2" onclick="clearFilters()">Show All Cats</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('cats');

        // Populate filter dropdowns
        const allCats = getCats();
        const breeds = [...new Set(allCats.map(c => c.breed))].sort();
        const furColors = [...new Set(allCats.map(c => c.fur_color))].sort();
        const cattitudes = [...new Set(allCats.map(c => c.cattitude))].sort();

        const breedSelect = document.getElementById('filter-breed');
        breeds.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.textContent = b;
            breedSelect.appendChild(opt);
        });

        const furSelect = document.getElementById('filter-fur');
        furColors.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f; opt.textContent = f;
            furSelect.appendChild(opt);
        });

        const cattitudeSelect = document.getElementById('filter-cattitude');
        cattitudes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            cattitudeSelect.appendChild(opt);
        });

        function applyFilters() {
            const breed = document.getElementById('filter-breed').value;
            const gender = document.getElementById('filter-gender').value;
            const fur = document.getElementById('filter-fur').value;
            const cattitude = document.getElementById('filter-cattitude').value;

            let cats = getAvailableCats();

            if (breed) cats = cats.filter(c => c.breed === breed);
            if (gender) cats = cats.filter(c => c.gender === gender);
            if (fur) cats = cats.filter(c => c.fur_color === fur);
            if (cattitude) cats = cats.filter(c => c.cattitude === cattitude);

            renderCats(cats);
        }

        function clearFilters() {
            document.getElementById('filter-breed').value = '';
            document.getElementById('filter-gender').value = '';
            document.getElementById('filter-fur').value = '';
            document.getElementById('filter-cattitude').value = '';
            applyFilters();
        }

        function renderCats(cats) {
            const grid = document.getElementById('cat-grid');
            const empty = document.getElementById('empty-state');
            const count = document.getElementById('results-count');

            if (cats.length === 0) {
                grid.innerHTML = '';
                grid.style.display = 'none';
                empty.style.display = 'block';
                count.textContent = '';
            } else {
                grid.style.display = 'grid';
                empty.style.display = 'none';
                count.textContent = `Showing ${cats.length} adorable cat${cats.length > 1 ? 's' : ''} 🐾`;
                grid.innerHTML = cats.map(cat => createCatCard(cat, '../')).join('');
            }
        }

        // Initial render
        applyFilters();
    </script>
</body>
</html>
