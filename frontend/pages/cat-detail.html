<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Details — Meowtopia 🐾</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main>
        <section class="section">
            <div class="container">
                <div id="cat-detail-content"></div>
            </div>
        </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('cats');

        const catid = getParam('id');
        const cat = getCatById(catid);
        const content = document.getElementById('cat-detail-content');

        if (!cat) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-emoji">😿</div>
                    <h3>Cat not found</h3>
                    <p>This kitty might have already found a home!</p>
                    <a href="cats.html" class="btn btn-primary mt-2">Browse Other Cats</a>
                </div>
            `;
        } else {
            document.title = `${cat.breed} — Meowtopia 🐾`;
            const user = getCurrentUser();
            const foodPrefs = getCatFoodPrefs(cat.catid);

            let adoptButton = '';
            if (cat.is_available) {
                if (user) {
                    adoptButton = `<a href="adopt.html?id=${cat.catid}" class="btn btn-primary" style="font-size: 1.1rem; padding: 14px 36px;">Adopt Me 🐾</a>`;
                } else {
                    adoptButton = `<a href="login.html" class="btn btn-outline" style="font-size: 1.1rem; padding: 14px 36px;">Login to Adopt 🔐</a>`;
                }
            } else {
                adoptButton = `<span class="btn btn-secondary" style="opacity: 0.6; cursor: not-allowed; font-size: 1.1rem; padding: 14px 36px;">Already Adopted 💕</span>`;
            }

            const foodHTML = foodPrefs.length > 0 ? `
                <div style="margin-top: 24px; padding: 20px; background: var(--mint); border-radius: var(--radius-sm);">
                    <h4 style="margin-bottom: 8px;">🍽️ Favorite Foods</h4>
                    <div class="food-suggestions">
                        ${foodPrefs.map(f => `<span class="food-chip" style="background: var(--accent); color: #fff;">${f.name} — ₹${f.price}</span>`).join('')}
                    </div>
                </div>
            ` : '';

            content.innerHTML = `
                <a href="cats.html" style="display: inline-flex; align-items: center; gap: 6px; color: var(--text-light); font-weight: 600; margin-bottom: 24px;">
                    ← Back to all cats
                </a>
                <div class="detail-container">
                    <div class="detail-image" style="background: ${cat.gradient};">
                        ${getCatImageHTML(cat, 'detail')}
                    </div>
                    <div class="detail-info">
                        <h1>${cat.name || 'Unnamed Kitty'}</h1>
                        <p class="detail-breed">${cat.breed} · ${cat.cattitude}</p>

                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="label">Age</div>
                                <div class="value">${cat.age}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Gender</div>
                                <div class="value">${cat.gender}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Fur Color</div>
                                <div class="value">${cat.fur_color}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Health Status</div>
                                <div class="value">${cat.health_status}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Cattitude</div>
                                <div class="value">${cat.cattitude}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Intake Date</div>
                                <div class="value">${formatDate(cat.intake_date)}</div>
                            </div>
                        </div>

                        ${adoptButton}
                        ${foodHTML}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
