<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Details — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="detail-container">
        <a href="cats.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-light);font-weight:600;margin-bottom:1.2rem">← Back to all cats</a>
        <div id="cat-detail-content"></div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('cats');

        const catid = getParam('id');
        const cat = getCatById(catid);
        const content = document.getElementById('cat-detail-content');

        if (!cat) {
            content.innerHTML = `
                <div style="text-align:center;padding:3rem 0">
                    <div style="font-size:3rem">😿</div>
                    <h3>Cat not found</h3>
                    <p style="color:var(--text-light)">This kitty might have already found a home!</p>
                    <a href="cats.html" class="btn-primary" style="display:inline-block;padding:.7rem 1.4rem;border-radius:8px;margin-top:1rem">Browse Other Cats</a>
                </div>`;
        } else {
            document.title = `${cat.shelter_name} — Meowtopia 🐾`;
            const user = getCurrentUser();
            const returnTo = encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);
            const age = formatAge(cat.dob);
            const healthClass = cat.health_status === 'Healthy' ? 'healthy' : 'needs-care';
            const furGrad = furColorGradient(cat.fur_color);

            let adoptBtn = '';
            if (cat.is_available) {
                if (user && user.role !== 'admin') {
                    adoptBtn = `<a href="adopt.html?id=${cat.catid}" class="btn-primary" style="display:inline-block;padding:.85rem 2rem;border-radius:8px;font-size:1.05rem">Adopt Me 🐾</a>`;
                } else if (!user) {
                    adoptBtn = `<a href="login.html?redirect=${returnTo}" class="btn-outline" style="display:inline-block;padding:.85rem 2rem;border-radius:8px;font-size:1.05rem">Login to Adopt 🔐</a>`;
                }
            } else {
                adoptBtn = `<span class="btn-outline" style="display:inline-block;padding:.85rem 2rem;border-radius:8px;opacity:.6;cursor:not-allowed">Already Adopted 💕</span>`;
            }

            // Calculate text color based on fur color brightness
            const colorMatch = furGrad.match(/#[\da-f]{6}/i);
            const hexColor = colorMatch ? colorMatch[0] : '#ffffff';
            const brightness = getColorBrightness(hexColor);
            const textColor = brightness > 128 ? '#000' : '#fff';
            const textShadow = brightness > 128 ? '0 1px 2px rgba(255,255,255,.3)' : '0 1px 3px rgba(0,0,0,.2)';

            content.innerHTML = `
                <div class="detail-grid">
                    <div class="detail-img" style="border:3px solid transparent;background-image:${furGrad};background-origin:border-box;">
                        ${getCatImageHTML(cat)}
                    </div>
                    <div class="detail-info">
                        <h1 style="font-family:'Playfair Display',Georgia,serif">${cat.shelter_name}</h1>
                        <p class="breed">${cat.breed}</p>

                        <div class="detail-attrs">
                            <span class="detail-attr"><span class="icon">⏳</span> ${age}</span>
                            <span class="detail-attr"><span class="icon">${cat.gender === 'Male' ? '♂' : '♀'}</span> ${cat.gender}</span>
                            <span class="detail-attr" style="background:${furGrad};color:${textColor};text-shadow:${textShadow}"><span class="icon">🎨</span> ${cat.fur_color}</span>
                            <span class="detail-attr"><span class="icon">😸</span> ${cat.cattitude}</span>
                        </div>

                        <p class="detail-health ${healthClass}">
                            ${cat.health_status === 'Healthy' ? '✅' : '🩺'} ${cat.health_status}
                        </p>

                        <p class="detail-desc">
                            <strong>Date of Birth:</strong> ${cat.dob}<br>
                            <strong>Intake Date:</strong> ${formatDate(cat.intake_date)}
                        </p>

                        <div class="detail-actions">
                            ${adoptBtn}
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
