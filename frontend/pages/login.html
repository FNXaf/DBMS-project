<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Meowtopia 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="form-page">
        <div class="form-card">
            <h2>Welcome Back! 🐱</h2>
            <p class="form-subtitle">Login to continue your Meowtopia journey</p>

            <div id="login-alert"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                    <div class="error-text">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Your password" required>
                    <div class="error-text">Password is required</div>
                </div>

                <button type="submit" class="form-submit">Login 🐾</button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>

            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
                <p style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 8px;">Quick Demo Accounts:</p>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
                    <button class="btn-primary" style="padding:.4rem .8rem;border-radius:8px;font-size:.82rem;cursor:pointer" onclick="fillDemo('admin@meowtopia.com', 'admin123')">Admin Login</button>
                    <button class="btn-outline" style="padding:.4rem .8rem;border-radius:8px;font-size:.82rem;cursor:pointer" onclick="fillDemo('sam@example.com', 'sam123')">User Login</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        renderNavbar('login');

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = '../index.html';
        }

        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const result = loginUser(email, password);
            const alertDiv = document.getElementById('login-alert');

            if (result.success) {
                alertDiv.innerHTML = '<div class="alert alert-success">Login successful! Redirecting... 🐾</div>';
                setTimeout(() => {
                    // Redirect based on role
                    if (result.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (isOwner(result.user.userid)) {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                }, 800);
            } else {
                alertDiv.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
            }
        }
    </script>
</body>
</html>
